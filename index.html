<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Componentes_PC_PY</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- ICONOS -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <!-- PARTICULAS -->
  <div class="particles"></div>

  <!-- NAVBAR -->
  <header>

    <div class="logo">
      <i class="fa-solid fa-gamepad"></i>
      GamesZone
    </div>

    <nav>
      <a href="#">Inicio</a>
      <a href="#">Juegos</a>
      <a href="#">Categorías</a>
      <a href="#">Contacto</a>
    </nav>

    <div class="icons">
      <i class="fa-solid fa-magnifying-glass"></i>
      <i class="fa-solid fa-user"></i>
    </div>

  </header>

  <!-- HERO -->
  <section class="hero">

    <div class="overlay"></div>

    <img src="img/banner.jpg" class="hero-img">

    <div class="hero-content">

      <h1>Elias PC Gaming</h1>

      <p>
        Descubre los mejores juegos, efectos visuales modernos
        y una experiencia totalmente futurista.
      </p>

      <button>Ver Juego</button>

    </div>

  </section>

  <!-- TARJETAS -->
  <section class="games-section">

    <div class="title">
      <h2>Últimos Juegos</h2>
    </div>

    <div class="games-container">

      <div class="card">
        <img src="img/game1.jpg">
        <h3>Cyber Adventure</h3>
      </div>

      <div class="card">
        <img src="img/game2.jpg">
        <h3>Dark Future</h3>
      </div>

      <div class="card">
        <img src="img/game3.jpg">
        <h3>Galaxy War</h3>
      </div>

      <div class="card">
        <img src="img/game1.jpg">
        <h3>Battle Arena</h3>
      </div>

    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 GamesZone
  </footer>

  <script src="script.js"></script>

</body>
</html>
